<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>內容管理 — 林立勝個人網站</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f4f5f8;--ink:#1c1d22;--ink-2:#5b5f68;--ink-3:#9095a0;
  --glass:rgba(255,255,255,.6);--glass-border:rgba(255,255,255,.8);
  --accent-1:#5b6cff;--accent-2:#2bb3d4;
  --grad:linear-gradient(135deg,#5b6cff,#2bb3d4);
  --shadow:0 8px 32px rgba(60,70,110,.10),0 1.5px 4px rgba(60,70,110,.06);
  --font:'Inter','Noto Sans TC',-apple-system,'PingFang TC','Microsoft JhengHei',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased;padding-bottom:120px}
.aurora{position:fixed;inset:0;z-index:-1;overflow:hidden;pointer-events:none}
.blob{position:absolute;border-radius:50%;filter:blur(100px);opacity:.4}
.b1{width:500px;height:500px;background:#aeb8ff;top:-180px;left:-120px}
.b2{width:420px;height:420px;background:#a5e6f2;top:30%;right:-160px}
.b3{width:460px;height:460px;background:#f6c6dd;bottom:-200px;left:30%}

.topbar{position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:12px;
  padding:14px 26px;background:rgba(255,255,255,.75);backdrop-filter:blur(20px) saturate(180%);
  border-bottom:1px solid var(--glass-border);box-shadow:0 1px 12px rgba(60,70,110,.06)}
.topbar h1{font-size:16px;font-weight:800}
.topbar h1 span{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.topbar .sp{flex:1}
.btn{font-family:var(--font);font-size:13.5px;font-weight:600;cursor:pointer;border:none;
  padding:10px 20px;border-radius:999px;transition:all .25s;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
.btn-pri{background:var(--grad);color:#fff;box-shadow:0 6px 18px rgba(91,108,255,.3)}
.btn-pri:hover{transform:translateY(-1px);box-shadow:0 10px 26px rgba(91,108,255,.4)}
.btn-sec{background:rgba(255,255,255,.8);color:var(--ink);border:1px solid var(--glass-border);box-shadow:var(--shadow)}
.btn-sec:hover{transform:translateY(-1px)}
.btn-ghost{background:transparent;color:var(--ink-2);padding:8px 12px}
.btn-ghost:hover{color:var(--accent-1)}

.wrap{max-width:880px;margin:0 auto;padding:30px 24px}
.note{font-size:13px;color:var(--ink-2);background:rgba(255,255,255,.65);border:1px solid var(--glass-border);
  border-radius:14px;padding:14px 18px;margin-bottom:26px;box-shadow:var(--shadow)}
.note b{color:var(--accent-1)}

details.sec{background:var(--glass);border:1px solid var(--glass-border);border-radius:18px;
  box-shadow:var(--shadow);margin-bottom:16px;backdrop-filter:blur(20px);overflow:hidden}
details.sec>summary{cursor:pointer;list-style:none;padding:18px 24px;font-size:15px;font-weight:700;
  display:flex;align-items:center;gap:10px;user-select:none}
details.sec>summary::before{content:'▸';color:var(--accent-1);transition:transform .25s;font-size:13px}
details.sec[open]>summary::before{transform:rotate(90deg)}
details.sec>.body{padding:4px 24px 24px}

.field{margin-bottom:14px}
.field label{display:block;font-size:11.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);margin-bottom:5px}
.field input,.field textarea{width:100%;font-family:var(--font);font-size:14px;color:var(--ink);
  background:rgba(255,255,255,.85);border:1px solid rgba(190,196,210,.6);border-radius:10px;
  padding:9px 13px;transition:border .2s,box-shadow .2s;resize:vertical}
.field textarea{min-height:64px}
.field input:focus,.field textarea:focus{outline:none;border-color:var(--accent-1);box-shadow:0 0 0 3px rgba(91,108,255,.12)}
.bi{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:700px){.bi{grid-template-columns:1fr}}

.item{background:rgba(255,255,255,.5);border:1px solid var(--glass-border);border-radius:14px;
  padding:16px 18px 12px;margin-bottom:12px;position:relative}
.item-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.item-head .ttl{font-size:13px;font-weight:700;color:var(--ink-2)}
.item-tools{display:flex;gap:2px}
.tool{font-size:13px;cursor:pointer;border:none;background:transparent;color:var(--ink-3);
  width:28px;height:28px;border-radius:8px;transition:all .2s}
.tool:hover{background:rgba(91,108,255,.1);color:var(--accent-1)}
.tool.del:hover{background:rgba(255,80,90,.1);color:#e5484d}
.add-btn{font-family:var(--font);width:100%;font-size:13px;font-weight:600;color:var(--accent-1);cursor:pointer;
  background:rgba(91,108,255,.06);border:1.5px dashed rgba(91,108,255,.35);border-radius:12px;
  padding:11px;transition:all .25s;margin-top:4px}
.add-btn:hover{background:rgba(91,108,255,.12)}
.sub-lbl{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);margin:12px 0 8px}

#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);z-index:80;
  background:rgba(28,29,34,.92);color:#fff;font-size:13.5px;font-weight:500;
  padding:12px 22px;border-radius:999px;opacity:0;transition:all .35s;pointer-events:none;backdrop-filter:blur(10px)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="aurora"><div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div></div>

<div class="topbar">
  <h1>內容管理 <span>Content Studio</span></h1>
  <div class="sp"></div>
  <a class="btn btn-ghost" href="index.html" target="_blank">預覽網站 ↗</a>
  <button class="btn btn-sec" onclick="downloadFile()">下載 content.js</button>
  <button class="btn btn-pri" onclick="saveDirect()">💾 直接存回</button>
</div>

<div class="wrap">
  <div class="note">
    改完按右上角 <b>「直接存回」</b>,選擇這個資料夾裡的 <b>content.js</b> 並確認覆蓋,重新整理 index.html 就會看到更新。<br>
    瀏覽器不支援直接存回時(如 Safari / Firefox),改用「下載 content.js」再手動取代原檔。現在首頁固定使用中文欄位,英文欄位先保留作為未來雙語版本備用。<br>
    想新增作品卡時,到「作品」區塊新增一筆作品並存回 content.js；首頁的塔羅扇形排版會依作品數量自動重排。
  </div>
  <div id="form"></div>
</div>

<div id="toast"></div>

<script src="content.js"></script>
<script>
const S = structuredClone(window.SITE_CONTENT);
const $form = document.getElementById('form');

/* ---------- 元件工具 ---------- */
function el(tag, cls, html){ const e=document.createElement(tag); if(cls)e.className=cls; if(html!=null)e.innerHTML=html; return e; }

function biField(label, obj, useTextarea=false){
  const f = el('div','field');
  f.appendChild(el('label',null,label));
  const grid = el('div','bi');
  ['zh','en'].forEach(k=>{
    const inp = el(useTextarea?'textarea':'input');
    if(!useTextarea) inp.type='text';
    inp.value = obj[k] ?? '';
    inp.placeholder = k==='zh'?'中文':'English';
    inp.oninput = ()=> obj[k] = inp.value;
    grid.appendChild(inp);
  });
  f.appendChild(grid);
  return f;
}

function txtField(label, obj, key, useTextarea=false){
  const f = el('div','field');
  f.appendChild(el('label',null,label));
  const inp = el(useTextarea?'textarea':'input');
  if(!useTextarea) inp.type='text';
  inp.value = obj[key] ?? '';
  inp.oninput = ()=> obj[key] = inp.value;
  f.appendChild(inp);
  return f;
}

function section(title, open=false){
  const d = el('details','sec'); if(open) d.open = true;
  d.appendChild(el('summary',null,title));
  const b = el('div','body');
  d.appendChild(b);
  $form.appendChild(d);
  return b;
}

/* 可排序清單:list=陣列, renderItem(item)=>node, makeNew()=>新項目, label(i,item)=>標題 */
function listEditor(container, list, renderItem, makeNew, label, addText){
  function draw(){
    container.innerHTML = '';
    list.forEach((item,i)=>{
      const box = el('div','item');
      const head = el('div','item-head');
      head.appendChild(el('span','ttl', label(i,item)));
      const tools = el('div','item-tools');
      const mk = (txt,fn,cls='tool')=>{ const b=el('button',cls,txt); b.onclick=fn; tools.appendChild(b); };
      mk('↑', ()=>{ if(i>0){ [list[i-1],list[i]]=[list[i],list[i-1]]; draw(); }});
      mk('↓', ()=>{ if(i<list.length-1){ [list[i+1],list[i]]=[list[i],list[i+1]]; draw(); }});
      mk('✕', ()=>{ if(confirm('確定刪除「'+label(i,item)+'」?')){ list.splice(i,1); draw(); }}, 'tool del');
      head.appendChild(tools);
      box.appendChild(head);
      box.appendChild(renderItem(item));
      container.appendChild(box);
    });
    const add = el('button','add-btn', addText);
    add.onclick = ()=>{ list.push(makeNew()); draw(); };
    container.appendChild(add);
  }
  draw();
}

/* ---------- 各區塊表單 ---------- */
// Hero
(()=>{ const b = section('🏠 首屏 Hero', true);
  b.appendChild(txtField('小標籤(不分語言)', S.hero, 'eyebrow'));
  b.appendChild(biField('名字', S.hero.name));
  b.appendChild(biField('主標語', S.hero.tagline));
  b.appendChild(biField('副標說明', S.hero.sub, true));
  b.appendChild(biField('按鈕 1', S.hero.cta1));
  b.appendChild(biField('按鈕 2', S.hero.cta2));
  b.appendChild(biField('下滑提示', S.hero.scrollHint));
})();

// Links
(()=>{ const b = section('🔗 對外連結');
  b.appendChild(txtField('X(Twitter)網址', S.links, 'x'));
  b.appendChild(txtField('GitHub 網址', S.links, 'github'));
  b.appendChild(txtField('Email', S.links, 'email'));
})();

// Stats
(()=>{ const b = section('📊 數據亮點');
  const c = el('div'); b.appendChild(c);
  listEditor(c, S.stats,
    s=>{ const w=el('div');
      w.appendChild(txtField('數字(如 810K+)', s, 'num'));
      w.appendChild(biField('說明文字', s.lbl));
      return w; },
    ()=>({num:'0', lbl:{zh:'新數據', en:'New stat'}}),
    (i,s)=>`#${i+1} ${s.num}`,
    '＋ 新增數據');
})();

// About
(()=>{ const b = section('👤 關於我');
  b.appendChild(biField('區塊標題', S.about.heading));
  b.appendChild(el('div','sub-lbl','自我介紹段落(可用 &lt;strong&gt; 加粗)'));
  const pc = el('div'); b.appendChild(pc);
  listEditor(pc, S.about.paragraphs,
    p=> biField('段落內容', p, true),
    ()=>({zh:'新段落', en:'New paragraph'}),
    (i)=>`段落 ${i+1}`,
    '＋ 新增段落');
  b.appendChild(el('div','sub-lbl','技能標籤'));
  const sc = el('div'); b.appendChild(sc);
  listEditor(sc, S.about.skills,
    s=> biField('標籤', s),
    ()=>({zh:'新技能', en:'New skill'}),
    (i,s)=> s.zh || `技能 ${i+1}`,
    '＋ 新增技能');
  b.appendChild(el('div','sub-lbl','語言能力'));
  const lc = el('div'); b.appendChild(lc);
  listEditor(lc, S.about.langs,
    s=> biField('語言', s),
    ()=>({zh:'新語言', en:'New language'}),
    (i,s)=> s.zh || `語言 ${i+1}`,
    '＋ 新增語言');
})();

// Works
(()=>{ const b = section('🗂 精選作品');
  b.appendChild(biField('區塊標題', S.work.heading));
  b.appendChild(biField('區塊副標', S.work.sub, true));
  const c = el('div'); b.appendChild(c);
  listEditor(c, S.work.items,
    w=>{ const box=el('div');
      box.appendChild(biField('分類標籤', w.tag));
      box.appendChild(biField('作品標題', w.title));
      box.appendChild(biField('描述', w.desc, true));
      box.appendChild(txtField('連結網址(留空 = 純展示卡片)', w, 'link'));
      box.appendChild(biField('連結文字', w.linkLabel));
      box.appendChild(el('div','sub-lbl','小標籤(數據/特點)'));
      const mc = el('div'); box.appendChild(mc);
      listEditor(mc, w.metas,
        m=> biField('標籤', m),
        ()=>({zh:'新標籤', en:'New tag'}),
        (i,m)=> m.zh || `標籤 ${i+1}`,
        '＋ 新增小標籤');
      return box; },
    ()=>({ tag:{zh:'分類',en:'Category'}, title:{zh:'新作品',en:'New work'},
           desc:{zh:'描述…',en:'Description…'}, metas:[], link:'', linkLabel:{zh:'',en:''} }),
    (i,w)=> w.title.zh || `作品 ${i+1}`,
    '＋ 新增作品卡片');
})();

// Journey
(()=>{ const b = section('🧭 經歷時間軸');
  b.appendChild(biField('區塊標題', S.journey.heading));
  const c = el('div'); b.appendChild(c);
  listEditor(c, S.journey.items,
    j=>{ const box=el('div');
      box.appendChild(txtField('時間(如 2024.09 – 2026.06)', j, 'when'));
      box.appendChild(biField('標題', j.title));
      box.appendChild(biField('單位/身分', j.org));
      box.appendChild(biField('描述', j.desc, true));
      return box; },
    ()=>({ when:'2026', title:{zh:'新經歷',en:'New entry'}, org:{zh:'',en:''}, desc:{zh:'',en:''} }),
    (i,j)=> j.title.zh || `經歷 ${i+1}`,
    '＋ 新增經歷');
})();

// Contact + Footer
(()=>{ const b = section('✉️ 聯絡區與頁尾');
  b.appendChild(biField('聯絡區標題', S.contact.heading));
  b.appendChild(biField('聯絡區說明', S.contact.desc, true));
  b.appendChild(biField('頁尾文字', S.footer));
})();

/* ---------- 儲存 ---------- */
function serialize(){
  return '/* 由 admin.html 產生 — 也可以直接手動編輯 */\nwindow.SITE_CONTENT = '
    + JSON.stringify(S, null, 2) + ';\n';
}
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2600);
}
async function saveDirect(){
  if (!window.showSaveFilePicker){ toast('此瀏覽器不支援直接存回,已改為下載'); downloadFile(); return; }
  try{
    const handle = await window.showSaveFilePicker({
      suggestedName:'content.js',
      types:[{description:'JavaScript', accept:{'text/javascript':['.js']}}]
    });
    const w = await handle.createWritable();
    await w.write(serialize());
    await w.close();
    toast('✅ 已儲存!重新整理 index.html 即可看到更新');
  }catch(e){ if(e.name!=='AbortError') toast('儲存失敗:'+e.message); }
}
function downloadFile(){
  const blob = new Blob([serialize()], {type:'text/javascript'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = 'content.js';
  a.click(); URL.revokeObjectURL(a.href);
  toast('已下載,請取代資料夾中的 content.js');
}
</script>
</body>
</html>
